<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はるねこちゃん — 人事・経営ニュース</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --border: #E5DFD4;
      --text: #2B2620;
      --text-sub: #6B645C;
      --green: #6B8F71;
      --green-dark: #4F6E55;
      --rose: #E8A0B4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 400;
      line-height: 1.75;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-title p {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-top: 1px;
    }

    /* ===== MAIN ===== */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ===== DATE LABEL ===== */
    .date-label {
      font-size: 0.8rem;
      color: var(--text-sub);
      text-align: right;
      margin-bottom: 20px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(43,38,32,0.08);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .theory-badge {
      background: var(--green);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .card-headline {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sub);
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .card-summary {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .theory-box {
      background: #F0F5F1;
      border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .theory-box-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--green-dark);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .theory-box-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.7;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .read-link {
      font-size: 0.78rem;
      color: var(--green-dark);
      text-decoration: none;
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 4px 12px;
      transition: background 0.15s;
    }

    .read-link:hover {
      background: var(--green);
      color: #fff;
    }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 64px 16px;
      color: var(--text-sub);
    }

    .empty svg {
      width: 56px;
      height: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty p {
      font-size: 0.9rem;
    }

    /* ===== FOOTER ===== */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 16px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    footer a {
      color: var(--green-dark);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .card { padding: 18px; }
      .card-headline { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <img class="header-icon" src="favicon.svg" alt="はるねこちゃん">
  <div class="header-title">
    <h1>はるねこちゃん</h1>
    <p>人事・経営ニュース × 世界標準の経営理論</p>
  </div>
</header>

<main>
  <p class="date-label"><!-- DATE_LABEL --></p>

  <div id="news-container">
    <!-- NEWS_CARDS -->
  </div>
</main>

<footer>
  <p>経営理論の解説は入山章栄『世界標準の経営理論』を参考にしています。</p>
  <p style="margin-top:4px;">Powered by <a href="https://www.notion.so/" target="_blank">Notion</a> + <a href="https://github.com/daiyatsuda/harunekochan" target="_blank">GitHub Actions</a></p>
</footer>

</body>
</html>
